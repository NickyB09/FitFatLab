version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: fitfatlab-postgres
    environment:
      POSTGRES_DB: fitfatlab_db
      POSTGRES_USER: fitfatlab
      POSTGRES_PASSWORD: fitfatlab123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
