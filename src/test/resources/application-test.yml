spring:
  datasource:
    url: jdbc:h2:mem:fitfatlab_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
  flyway:
    enabled: false

fitfatlab:
  security:
    jwt:
      secret-key: dGVzdC1zZWNyZXQta2V5LWZpdGZhdGxhYi10ZXN0aW5nLTI1NmJpdHMtbG9uZ2Vub3VnaA==
      expiration-ms: 3600000
      refresh-expiration-ms: 86400000
  bootstrap:
    seed-admin:
      enabled: false
