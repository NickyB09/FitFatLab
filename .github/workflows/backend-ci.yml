name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "feat/**"
      - "fix/**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -q test

      - name: Verify package
        run: ./mvnw -q -DskipTests verify
